# Ask Selectiva - Local AI Knowledge Ingestion & RAG Platform
# Ollama runs on host - NOT dockerized

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ask_selectiva
      POSTGRES_USER: selectiva
      POSTGRES_PASSWORD: selectiva_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/init_pgvector.sql:/docker-entrypoint-initdb.d/01_init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U selectiva -d ask_selectiva"]
      interval: 5s
      timeout: 5s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

  api:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://selectiva:selectiva_dev@postgres:5432/ask_selectiva
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      OLLAMA_MODEL: llama3.1:8b
      OLLAMA_ESCALATION_MODEL: llama3.1:8b
      OLLAMA_REQUEST_TIMEOUT_SECONDS: "600"
    extra_hosts:
      - "host.docker.internal:host-gateway"

  kafka-consumer:
    build: .
    command: python -m app.ingestion.consumer
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
    environment:
      DATABASE_URL: postgresql+asyncpg://selectiva:selectiva_dev@postgres:5432/ask_selectiva
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    restart: unless-stopped

volumes:
  postgres_data:
